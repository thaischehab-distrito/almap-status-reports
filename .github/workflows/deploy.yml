name: Deploy Status Reports — AlmapBBDO

on:
  # Toda sexta-feira às 10h horário de Brasília (UTC-3 = 13h UTC)
  # Este workflow faz o deploy do HTML que está na branch main
  # Para atualização com dados do Drive, use o Cowork (ver COWORK_PROMPT.md)
  schedule:
    - cron: '0 13 * * 5'

  # Permite rodar manualmente pelo painel do GitHub Actions
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo da atualização manual'
        required: false
        default: 'Atualização manual do Status Report'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    name: Sincronizar main → gh-pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório completo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Git
        run: |
          git config user.name  "Distrito Deploy Bot"
          git config user.email "deploy@distrito.me"

      - name: Verificar index.html
        run: |
          if [ ! -f index.html ]; then
            echo "❌ index.html não encontrado"
            exit 1
          fi
          echo "✅ index.html OK — $(wc -c < index.html) bytes"

      - name: Atualizar data no HTML
        run: |
          DATAHORA=$(TZ="America/Sao_Paulo" date "+%d/%m/%Y às %H:%M")
          sed -i "s/Atualizado automaticamente via Drive/Atualizado em $DATAHORA (Brasília)/g" index.html
          sed -i "s/Atualizado em .* (Brasília)/Atualizado em $DATAHORA (Brasília)/g" index.html
          echo "✅ Data: $DATAHORA"

      - name: Deploy para gh-pages
        run: |
          git fetch origin gh-pages
          git checkout gh-pages
          git checkout main -- index.html
          DATAHORA=$(TZ="America/Sao_Paulo" date "+%d/%m/%Y %H:%M")
          git add index.html
          if git diff --staged --quiet; then
            echo "ℹ️ Sem alterações"
          else
            git commit -m "chore: deploy automático — $DATAHORA"
            git push origin gh-pages
            echo "✅ Deploy ok!"
          fi

      - name: Resumo
        run: |
          echo "## ✅ Deploy concluído" >> $GITHUB_STEP_SUMMARY
          echo "- **Site:** https://thaischehab-distrito.github.io/almap-status-reports" >> $GITHUB_STEP_SUMMARY
          echo "- **Horário:** $(TZ='America/Sao_Paulo' date '+%d/%m/%Y às %H:%M') (Brasília)" >> $GITHUB_STEP_SUMMARY
