name: Deploy Status Reports — AlmapBBDO

on:
  # Toda sexta-feira às 10h horário de Brasília (UTC-3 = 13h UTC)
  schedule:
    - cron: '0 13 * * 5'

  # Permite rodar manualmente pelo painel do GitHub Actions
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo da atualização manual'
        required: false
        default: 'Atualização manual do Status Report'

# Permissão para escrever no GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    name: Build e deploy do Status Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório (main)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configurar identidade do Git
        run: |
          git config user.name  "Distrito Deploy Bot"
          git config user.email "deploy@distrito.me"

      - name: Verificar arquivo index.html
        run: |
          if [ ! -f index.html ]; then
            echo "❌ index.html não encontrado na branch main"
            exit 1
          fi
          echo "✅ index.html encontrado ($(wc -c < index.html) bytes)"

      - name: Atualizar data de geração no HTML
        run: |
          # Injeta a data/hora atual no rodapé do relatório
          DATAHORA=$(TZ="America/Sao_Paulo" date "+%d/%m/%Y às %H:%M")
          sed -i "s/Atualizado automaticamente via Drive/Atualizado em $DATAHORA (horário de Brasília)/g" index.html
          echo "✅ Data atualizada: $DATAHORA"

      - name: Fazer checkout da branch gh-pages
        run: |
          git fetch origin gh-pages
          git checkout gh-pages

      - name: Copiar index.html atualizado para gh-pages
        run: |
          git checkout main -- index.html
          echo "✅ index.html copiado da branch main para gh-pages"

      - name: Commit e push para gh-pages
        run: |
          DATAHORA=$(TZ="America/Sao_Paulo" date "+%d/%m/%Y %H:%M")
          git add index.html

          # Só commita se houver mudanças
          if git diff --staged --quiet; then
            echo "ℹ️ Nenhuma alteração detectada — deploy pulado"
          else
            git commit -m "chore: atualização automática do Status Report — $DATAHORA"
            git push origin gh-pages
            echo "✅ Deploy concluído com sucesso!"
          fi

      - name: Resumo do deploy
        run: |
          echo "## 🚀 Deploy concluído" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Site:** https://thaischehab-distrito.github.io/almap-status-reports" >> $GITHUB_STEP_SUMMARY
          echo "- **Horário:** $(TZ='America/Sao_Paulo' date '+%d/%m/%Y às %H:%M') (Brasília)" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** gh-pages" >> $GITHUB_STEP_SUMMARY
